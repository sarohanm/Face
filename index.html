<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regis AI — Biometric Auth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  /* ─── RESET & BASE ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #08090d;
    --surface:   #0e1018;
    --glass:     rgba(255,255,255,0.035);
    --border:    rgba(255,255,255,0.07);
    --cyan:      #00e5ff;
    --violet:    #7b5ea7;
    --green:     #00ffaa;
    --amber:     #ffcc00;
    --red:       #ff4466;
    --text:      #d0d4e8;
    --muted:     #4a5068;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Outfit', sans-serif;
  }

  html, body { height: 100%; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── AMBIENT BACKGROUND ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(0,229,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 90%, rgba(123,94,167,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ─── MAIN CARD ─── */
  .card {
    position: relative;
    width: min(440px, 100vw - 32px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px;
    box-shadow:
      0 0 0 1px rgba(0,229,255,0.04),
      0 30px 80px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.06);
    animation: cardIn 0.6s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: none; }
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 22px;
  }
  .logo {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(0,229,255,0.3);
  }
  .brand-name {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #fff;
  }
  .brand-tag {
    font-size: 0.7rem;
    font-family: var(--mono);
    color: var(--cyan);
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    padding: 2px 7px;
    border-radius: 20px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.05em;
  }
  .brand-sub {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ─── VIDEO FRAME ─── */
  .video-wrap {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
    aspect-ratio: 4/3;
    margin-bottom: 18px;
    border: 1px solid var(--border);
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
  }

  /* Corner brackets */
  .video-wrap::before,
  .video-wrap::after,
  .corner-bl, .corner-br {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--cyan);
    border-style: solid;
    z-index: 10;
    transition: border-color 0.4s;
  }
  .video-wrap::before { top: 10px; left: 10px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .video-wrap::after  { top: 10px; right: 10px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .corner-bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .corner-br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  /* Scanning line */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    top: 0;
    z-index: 9;
    animation: scan 2.5s linear infinite;
    opacity: 0.7;
  }
  .scan-line.hidden { display: none; }
  @keyframes scan {
    0%   { top: 0%;   opacity: 0; }
    5%   { opacity: 0.7; }
    95%  { opacity: 0.7; }
    100% { top: 100%; opacity: 0; }
  }

  /* Face overlay ring */
  .face-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 120px; height: 140px;
    border: 1.5px solid rgba(0,229,255,0.3);
    border-radius: 50%;
    z-index: 8;
    pointer-events: none;
  }

  /* ─── STATUS BOX ─── */
  .status-box {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 18px;
    min-height: 70px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.4s;
  }
  .status-box.loading   { border-color: var(--muted); }
  .status-box.scanning  { border-color: rgba(0,229,255,0.35); }
  .status-box.success   { border-color: rgba(0,255,170,0.4); }
  .status-box.error     { border-color: rgba(255,68,102,0.4); }
  .status-box.unknown   { border-color: rgba(255,68,102,0.4); }

  .status-icon {
    font-size: 1.8rem;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
    animation: iconPop 0.3s cubic-bezier(.22,.68,0,1.5) both;
  }
  @keyframes iconPop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .status-text { flex: 1; }
  .status-label {
    font-size: 0.65rem;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .status-msg {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.3;
    color: #fff;
  }
  .status-msg.amber { color: var(--amber); }
  .status-msg.green { color: var(--green); }
  .status-msg.cyan  { color: var(--cyan);  }
  .status-msg.red   { color: var(--red);   }

  /* ─── RESULT PANEL ─── */
  .result-panel {
    display: none;
    margin-top: 4px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(0,255,170,0.25);
    animation: slideUp 0.5s cubic-bezier(.22,.68,0,1.2) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
  }
  .result-header {
    background: rgba(0,255,170,0.07);
    border-bottom: 1px solid rgba(0,255,170,0.15);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .result-header-text {
    font-family: var(--mono);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--green);
  }
  .badge-verified {
    font-family: var(--mono);
    font-size: 0.6rem;
    background: rgba(0,255,170,0.12);
    border: 1px solid rgba(0,255,170,0.3);
    color: var(--green);
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.08em;
  }
  .badge-unknown {
    font-family: var(--mono);
    font-size: 0.6rem;
    background: rgba(255,68,102,0.12);
    border: 1px solid rgba(255,68,102,0.3);
    color: var(--red);
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.08em;
  }
  .name-display {
    background: rgba(0,0,0,0.4);
    padding: 16px 18px;
    text-align: center;
  }
  .name-value {
    font-family: var(--mono);
    font-size: 1.5rem;
    font-weight: bold;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .name-value.green { color: var(--green); }
  .name-value.red   { color: var(--red); }

  /* ─── FOOTER ─── */
  .footer {
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 0.65rem;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .footer-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--cyan);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--cyan); }
    50%       { opacity: 0.4; box-shadow: none; }
  }

  /* ─── SUCCESS FLASH ─── */
  @keyframes successFlash {
    0%   { border-color: rgba(0,255,170,0.8); box-shadow: 0 0 30px rgba(0,255,170,0.4); }
    100% { border-color: var(--border); box-shadow: none; }
  }
  .video-wrap.flash-success { animation: successFlash 0.6s ease-out; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20,22,30,0.95);
    border: 1px solid var(--green);
    color: var(--green);
    font-family: var(--mono);
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    padding: 10px 20px;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── LOADING SPINNER ─── */
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid var(--muted);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="logo">⬡</div>
    <div>
      <div class="brand-name">Regis AI <span class="brand-tag">BETA</span></div>
      <div class="brand-sub">Biometric Identity Engine</div>
    </div>
  </div>

  <!-- Video -->
  <div class="video-wrap" id="video-wrap">
    <div class="scan-line" id="scan-line"></div>
    <div class="face-ring"></div>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <video id="video" autoplay muted playsinline></video>
  </div>

  <!-- Status Box -->
  <div class="status-box loading" id="status-box">
    <div class="status-icon" id="status-icon">⬡</div>
    <div class="status-text">
      <div class="status-label" id="status-label">SYSTEM</div>
      <div class="status-msg cyan" id="status-msg">
        <span class="spinner"></span>Starting camera…
      </div>
    </div>
  </div>

  <!-- Result Panel -->
  <div class="result-panel" id="result-panel">
    <div class="result-header">
      <span class="result-header-text" id="result-header-text">🔍 Identity Result</span>
      <span id="result-badge" class="badge-verified">● LIVE</span>
    </div>
    <div class="name-display">
      <div class="name-value green" id="name-display">—</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-dot"></div>
    COLAB ENGINE · LIVE RECOGNITION
  </div>

</div>

<canvas id="hidden-canvas" style="display:none;"></canvas>

<script>
/* ─── CONFIG ─── */
const COLAB_URL = "https://5000-m-s-kkb-use4a1-rvb3n69k1fet-a.us-east4-1.prod.colab.dev/";
const INTERVAL_MS = 1500;

/* ─── DOM REFS ─── */
const video       = document.getElementById('video');
const canvas      = document.getElementById('hidden-canvas');
const statusBox   = document.getElementById('status-box');
const statusIcon  = document.getElementById('status-icon');
const statusLabel = document.getElementById('status-label');
const statusMsg   = document.getElementById('status-msg');
const resultPanel = document.getElementById('result-panel');
const nameDisplay = document.getElementById('name-display');
const resultBadge = document.getElementById('result-badge');
const videoWrap   = document.getElementById('video-wrap');
const scanLine    = document.getElementById('scan-line');
const toast       = document.getElementById('toast');

/* ─── TOAST ─── */
function showToast(msg, duration = 2000) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

/* ─── STATUS HELPER ─── */
function setStatus({ box = 'loading', label = 'SYSTEM', icon = '⬡', msg = '', cls = 'cyan' }) {
  statusBox.className = `status-box ${box}`;
  statusLabel.textContent = label;
  statusIcon.textContent = icon;
  statusIcon.style.animation = 'none';
  void statusIcon.offsetWidth;
  statusIcon.style.animation = 'iconPop 0.3s cubic-bezier(.22,.68,0,1.5) both';
  statusMsg.className = `status-msg ${cls}`;
  statusMsg.innerHTML = msg;
}

/* ─── CAMERA SETUP ─── */
async function setupCamera() {
  setStatus({ box: 'loading', label: 'CAMERA', icon: '📷', msg: '<span class="spinner"></span>Requesting camera access…', cls: 'cyan' });
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 640, height: 480 }
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);

    setStatus({ box: 'scanning', label: 'ENGINE', icon: '🔗', msg: '<span class="spinner"></span>Connecting to Colab server…', cls: 'cyan' });

    // Give server a quick ping before starting loop
    await pingServer();

  } catch (err) {
    setStatus({ box: 'error', label: 'CAMERA ERROR', icon: '⚠', msg: 'Camera access denied. Please allow camera access.', cls: 'red' });
    console.error(err);
  }
}

/* ─── PING SERVER ─── */
async function pingServer() {
  try {
    const resp = await fetch(`${COLAB_URL}`, { method: 'GET', signal: AbortSignal.timeout(4000) });
    if (resp.ok || resp.status === 404) {
      // Server is reachable (404 is fine — only /verify matters)
      setStatus({ box: 'scanning', label: 'SCANNING', icon: '🔍', msg: 'Scanning for faces…', cls: 'cyan' });
      resultPanel.style.display = 'block';
      startLoop();
    } else {
      throw new Error('Server returned ' + resp.status);
    }
  } catch (err) {
    setStatus({ box: 'error', label: 'CONNECTION ERROR', icon: '⚠', msg: 'Cannot reach Colab server. Make sure the Colab cell is running.', cls: 'red' });
    showToast('⚠ Colab server unreachable');
  }
}

/* ─── CAPTURE FRAME ─── */
function captureFrame() {
  if (video.readyState < 2) return null;
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.7);
}

/* ─── SEND FRAME TO COLAB ─── */
async function sendFrame() {
  const base64Image = captureFrame();
  if (!base64Image) return;

  try {
    const response = await fetch(`${COLAB_URL}verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64Image }),
      signal: AbortSignal.timeout(5000)
    });

    const result = await response.json();

    if (result.status === 'success') {
      const isKnown = result.name && result.name !== 'Unknown';

      nameDisplay.textContent = result.name;
      nameDisplay.className   = `name-value ${isKnown ? 'green' : 'red'}`;
      resultBadge.textContent = isKnown ? '✓ VERIFIED' : '✗ UNKNOWN';
      resultBadge.className   = isKnown ? 'badge-verified' : 'badge-unknown';

      if (isKnown) {
        setStatus({ box: 'success', label: 'ACCESS GRANTED', icon: '✓', msg: `Identity confirmed: <strong>${result.name}</strong>`, cls: 'green' });
        videoWrap.classList.remove('flash-success');
        void videoWrap.offsetWidth;
        videoWrap.classList.add('flash-success');
      } else {
        setStatus({ box: 'unknown', label: 'NOT RECOGNIZED', icon: '🔍', msg: 'Face detected but identity unknown.', cls: 'red' });
      }

    } else {
      // No face detected
      nameDisplay.textContent = '—';
      nameDisplay.className   = 'name-value cyan';
      resultBadge.textContent = '● LIVE';
      resultBadge.className   = 'badge-verified';
      setStatus({ box: 'scanning', label: 'SCANNING', icon: '🔍', msg: 'No face detected. Position yourself in frame.', cls: 'cyan' });
    }

  } catch (err) {
    setStatus({ box: 'error', label: 'CONNECTION LOST', icon: '⚠', msg: 'Lost connection to Colab server.', cls: 'red' });
    console.warn('Colab connection error:', err);
  }
}

/* ─── MAIN LOOP ─── */
function startLoop() {
  sendFrame(); // first call immediately
  setInterval(sendFrame, INTERVAL_MS);
}

/* ─── BOOT ─── */
setupCamera();
</script>
</body>
</html>
